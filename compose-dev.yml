services:
  hexer:
    stdin_open: false
    tty: true
    ports:
      - 4242:4242
    environment:
      - HEXER_LOG_BASEPATH:/src/
      - HEXER_CONFIG:.hexer.yaml
      - TERM=xterm-256color
    build:
      dockerfile: ./docker/dev
      context: .
    command: go run main.go serve
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /src/
        - action: rebuild
          path: go.mod
